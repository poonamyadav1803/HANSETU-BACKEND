version: "3.9"

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hansetu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${ECR_REGISTRY}/hansetu/backend:${VERSION}
    container_name: hansetu-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:                   3000
      DATABASE_URL:             ${DATABASE_URL}
      JWT_SECRET:               ${JWT_SECRET}
      SMTP_HOST:                ${SMTP_HOST}
      SMTP_PORT:                ${SMTP_PORT}
      SMTP_USER:                ${SMTP_USER}
      SMTP_PASS:                ${SMTP_PASS}
      EMAIL_FROM:               ${EMAIL_FROM}
      WHITEBOOKS_CLIENT_ID:     ${WHITEBOOKS_CLIENT_ID}
      WHITEBOOKS_CLIENT_SECRET: ${WHITEBOOKS_CLIENT_SECRET}
      WHITEBOOKS_GST_API_URL:   ${WHITEBOOKS_GST_API_URL}
      WHITEBOOKS_GST_EMAIL:     ${WHITEBOOKS_GST_EMAIL}
      RAZORPAY_KEY_ID:          ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET:      ${RAZORPAY_KEY_SECRET}
      NODE_ENV:                 production
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: ${ECR_REGISTRY}/hansetu/frontend:${VERSION}
    container_name: hansetu-frontend
    restart: "no"
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
