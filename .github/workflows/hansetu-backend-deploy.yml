name: Hansetu-Backend-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - feature-workflow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com


      # 7. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t hansetu/backend .

      # 8. Run container for testing
      - name: Test container
        run: |
          docker run -d -p 3000:3000 --name hansetu hansetu/backend
          sleep 10
          docker logs hansetu   
          curl http://localhost:3000/api-docs

      # 9. Tag image
      - name: Tag image
        run: |
          docker tag hansetu/backend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu/backend:latest

      # 10. Push image to ECR
      - name: Push image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu/backend:latest
