name: Hansetu Full Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release Version (format: X.Y.Z)"
        required: true
        type: string

jobs:

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.90.86.15
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 20m

          script: |
            set -e

            VERSION="${{ github.event.inputs.version }}"

            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version format."
              echo "Expected format: X.Y.Z"
              exit 1
            fi

            export VERSION
            export ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

            echo "ŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöü"
            echo "Hansetu Deployment Started"
            echo "Version: $VERSION"
            echo "ŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöüŌöü"

            aws ecr get-login-password \
              --region ${{ secrets.AWS_REGION }} | \
              docker login \
              --username AWS \
              --password-stdin \
              $ECR_REGISTRY

            if [ -d "HANSETU-BACKEND" ]; then
              cd HANSETU-BACKEND
              docker-compose down || true
              docker system prune -af
              cd ..
              sudo rm -rf HANSETU-BACKEND
            fi

            git clone -b rollback-pipeline git@github.com:poonamyadav1803/HANSETU-BACKEND.git

            cd HANSETU-BACKEND

            cat > .env <<EOF
            PORT=3000
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            WHITEBOOKS_CLIENT_ID=${{ secrets.WHITEBOOKS_CLIENT_ID }}
            WHITEBOOKS_CLIENT_SECRET=${{ secrets.WHITEBOOKS_CLIENT_SECRET }}
            WHITEBOOKS_GST_API_URL=${{ secrets.WHITEBOOKS_GST_API_URL }}
            WHITEBOOKS_GST_EMAIL=${{ secrets.WHITEBOOKS_GST_EMAIL }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            EOF

            docker-compose pull
            docker-compose up -d

            sleep 60

            sudo systemctl reload nginx.service
            sudo systemctl restart nginx.service

            echo "Deployment completed successfully"
