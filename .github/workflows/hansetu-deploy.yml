name: Hansetu Full Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - rollback-pipeline

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  BACKEND_IMAGE: hansetu/backend
  FRONTEND_IMAGE: hansetu/frontend

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION.txt | tr -d '\n')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Create backend ECR repo if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.BACKEND_IMAGE }} \
            --region ${{ secrets.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.BACKEND_IMAGE }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }} \
            -f Dockerfile .

      - name: Test backend container
        run: |
          docker run -d \
            -p 3000:3000 \
            --name test-backend \
            -e PORT=3000 \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
            -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
            -e SMTP_USER="${{ secrets.SMTP_USER }}" \
            -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            -e EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}

      - name: Debug Backend
        run: |
          echo "Waiting..."
          sleep 180

          echo "===== CONTAINER STATUS ====="
          docker ps -a || true

          echo "===== CONTAINER LOGS ====="
          docker logs test-backend || true

          echo "===== PORTS ====="
          docker port test-backend || true

          echo "===== HEALTH CHECK ====="
          curl -v http://localhost:3000/api/health || true

      - name: Push backend image to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
          echo "Backend pushed successfully"

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: build-backend

    env:
      VERSION: ${{ needs.build-backend.outputs.version }}

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: poonamyadav1803/HANSETU-FRONTEND
          ref: rollback-pipeline

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Create frontend ECR repo if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.FRONTEND_IMAGE }} \
            --region ${{ secrets.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.FRONTEND_IMAGE }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.build-backend.outputs.version }} \
            -f Dockerfile .

      - name: Push frontend image to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.build-backend.outputs.version }}
          echo "Frontend pushed successfully"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    needs:
      - build-backend
      - build-frontend

    env:
      VERSION: ${{ needs.build-backend.outputs.version }}

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.89.253.117
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 20m
          script: |
            set -e

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Hansetu Deployment Started"
            echo "Version: ${{ needs.build-backend.outputs.version }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY

            if [ -d "HANSETU-BACKEND" ]; then
              cd HANSETU-BACKEND
              docker-compose down || true
              docker system prune -af
              cd ..
              sudo rm -rf HANSETU-BACKEND
            fi

            git clone -b main git@github.com:poonamyadav1803/HANSETU-BACKEND.git

            if [ -f ~/.env ]; then
              cp ~/.env HANSETU-BACKEND/
            fi

            cd HANSETU-BACKEND

            VERSION=$(cat VERSION.txt | tr -d '\n')

            export VERSION
            export ECR_REGISTRY

            docker-compose pull
            docker-compose up -d

            sleep 60

            sudo systemctl reload nginx.service
            sudo systemctl restart nginx.service

            echo "Deployment completed successfully"
