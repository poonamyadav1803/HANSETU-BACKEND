name: Hansetu-Backend-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - feature-workflow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # 5. Create ECR repo if not exists
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names hansetu-backend || \
          aws ecr create-repository --repository-name hansetu-backend

      # 6. Set image tag (commit SHA)
      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      # 7. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t hansetu-backend .

      # 8. Run container for testing
      - name: Test container
        run: |
          docker rm -f hansetu || true
          docker run -d -p 5000:5000 --name hansetu hansetu-backend
          sleep 10
          docker logs hansetu
          curl --fail http://localhost:5000

      # 9. Tag image
      - name: Tag image
        run: |
          docker tag hansetu-backend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu-backend:${{ steps.vars.outputs.TAG }}

          docker tag hansetu-backend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu-backend:latest

      # 10. Push image to ECR
      - name: Push image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu-backend:${{ steps.vars.outputs.TAG }}
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu-backend:latest

      # 11. Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR from EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Pull latest image
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu-backend:latest

            # Stop old container
            docker rm -f hansetu || true

            # Run new container
            docker run -d -p 5000:5000 --name hansetu \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/hansetu-backend:latest
